                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        {offset: 0, color: 'rgba(231,76,60,0.15)'},
                        {offset: 1, color: 'rgba(231,76,60,0.0)'}
                    ])
                },
                markArea: {
                    silent: true,
                    data: markAreaPairs
                },
                markLine: {
                    silent: true,
                    symbol: 'none',
                    lineStyle: {type: 'solid', color: '#e67e22', width: 2},
                    data: markLineData
                }
            },
            {
                name: '上涨家数',
                type: 'line',
                data: advData,
                yAxisIndex: 1,
                smooth: true,
                symbol: 'circle',
                symbolSize: 3,
                lineStyle: {color: '#2980b9', width: 1.5},
                itemStyle: {color: '#2980b9'},
                connectNulls: false
            }
        ]
    };
    return option;
}

chart.setOption(buildOption(currentPriceData));
window.addEventListener('resize', function() { chart.resize(); });

// === IndexedDB 缓存 ===
var DATA_VERSION = 'v1_20260623';
function openDB(){return new Promise(function(resolve,reject){var req=indexedDB.open('zt_board',1);req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('cache'))db.createObjectStore('cache',{keyPath:'key'});};req.onsuccess=function(e){resolve(e.target.result);};req.onerror=function(e){reject(e);};});}
function getCache(key){return openDB().then(function(db){return new Promise(function(resolve){var tx=db.transaction('cache','readonly');var r=tx.objectStore('cache').get(key);r.onsuccess=function(){resolve(r.result?r.result.value:null);};r.onerror=function(){resolve(null);};});}).catch(function(){return null;});}
function setCache(key,val){return openDB().then(function(db){return new Promise(function(resolve){var tx=db.transaction('cache','readwrite');tx.objectStore('cache').put({key:key,value:val});tx.oncomplete=function(){resolve();};tx.onerror=function(){resolve();};});}).catch(function(){});}

// === 加载全市场股票数据 ===
function onStockDataReady(stocks,names,fromCache){
    allStockData=stocks;stockNames=names;dataLoaded=true;
    var ind=document.getElementById('loadIndicator');
    if(ind){ind.innerHTML='<span style="color:#27ae60">'+(fromCache?'数据已加载(本地缓存)':'数据已加载')+'</span>';setTimeout(function(){if(ind)ind.style.display='none';},1200);}
    renderWatchlist();updateWatchlistBtn();
}

function parseCompactData(d){
    var codes=d.c,names=d.s,prices=d.p,n=d.n;
    var stocks={},nm={};
    for(var i=0;i<codes.length;i++){
        var cd=codes[i];nm[cd]=names[i];
        var sp=new Array(n);
        for(var j=0;j<n;j++){
            var p=prices[i*n+j];
            sp[j]=(p===0)?null:p/100;
        }
        stocks[cd]=sp;
    }
    return {stocks:stocks,names:nm};
}

function loadAllStockData(){
    var dataUrl=(window.location.hostname==='pq-hahaha.github.io')?'https://pq-hahaha.github.io/zt-board/breadth_stock_data.json':'breadth_stock_data.json';
    var cacheKey='sd_'+DATA_VERSION;
    var ind=document.getElementById('loadIndicator');
    getCache(cacheKey).then(function(cached){
        if(cached&&cached.stocks){onStockDataReady(cached.stocks,cached.names,true);return;}
        // 无缓存: fetch下载(gzip后仅2.4MB) + setTimeout延迟解析(不阻塞UI)
        if(ind)ind.innerHTML='<span style="color:#3498db">正在下载数据...</span>';
        var ctrl=new AbortController();
        var timer=setTimeout(function(){ctrl.abort();},30000);
        fetch(dataUrl,{signal:ctrl.signal})
            .then(function(r){clearTimeout(timer);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
            .then(function(d){
                if(ind)ind.innerHTML='<span style="color:#3498db">正在解析数据...</span>';
                setTimeout(function(){
                    var r=parseCompactData(d);
                    onStockDataReady(r.stocks,r.names,false);
                    setCache('sd_'+DATA_VERSION,{stocks:r.stocks,names:r.names});
                },50);
            })
            .catch(function(e){
                if(ind)ind.innerHTML='<span style="color:#e74c3c">加载失败,请刷新重试</span>';
            });
    });
}
loadAllStockData();

function loadStock() {
    var code = document.getElementById('stockCode').value.trim();
    if (!code) return;
    if (!dataLoaded) {
        document.getElementById('stockName').innerHTML = '<span style="color:#e67e22">数据加载中，请稍候...</span>';
        return;
    }
    if (!allStockData[code]) {
        document.getElementById('stockName').innerHTML = '<span style="color:#e74c3c">未找到: ' + code + '</span>';
        return;
    }
    var name = stockNames[code] || code;
    document.getElementById('stockName').textContent = name + '(' + code + ')';
    currentPriceData = allStockData[code];
    chart.setOption(buildOption(currentPriceData));
    updateWatchlistBtn();
}

// === 观察池功能 ===
var WL_KEY = 'zt_watchlist';
var WL_MAX = 30;
var wlMode = 'normal';
var wlSelected = new Set();

function getWatchlist() {
    try { return JSON.parse(localStorage.getItem(WL_KEY)) || []; }
    catch(e) { return []; }
}
function saveWatchlist(list) {
    localStorage.setItem(WL_KEY, JSON.stringify(list));
}
function addToWatchlist() {
    var code = document.getElementById('stockCode').value.trim();
    if (!code || !dataLoaded) return;
    var list = getWatchlist();
    if (list.length >= WL_MAX) return;
    for (var i = 0; i < list.length; i++) {
        if (list[i].code === code) return;
    }
    var name = stockNames[code] || code;
    list.push({code: code, name: name});
    saveWatchlist(list);
    renderWatchlist();
    updateWatchlistBtn();
}
function removeFromWatchlist(code) {
    var list = getWatchlist().filter(function(item) { return item.code !== code; });
    saveWatchlist(list);
    renderWatchlist();
    updateWatchlistBtn();
}
function removeFromWatchlistBatch() {
    if (wlSelected.size === 0) return;
    var list = getWatchlist().filter(function(item) { return !wlSelected.has(item.code); });
    saveWatchlist(list);
    wlSelected.clear();
    renderWatchlist();
    updateWatchlistBtn();
}
function loadFromWatchlist(code) {
    document.getElementById('stockCode').value = code;
    loadStock();
}
function toggleManageMode() {
    wlMode = wlMode === 'normal' ? 'manage' : 'normal';
    wlSelected.clear();
    renderWatchlist();
}
function toggleSelect(code) {
    if (wlSelected.has(code)) wlSelected.delete(code);
    else wlSelected.add(code);
    renderWatchlist();
}
function toggleSelectAll() {
    var list = getWatchlist();
    if (wlSelected.size === list.length) wlSelected.clear();
    else { wlSelected.clear(); list.forEach(function(item) { wlSelected.add(item.code); }); }
    renderWatchlist();
}
function updateWatchlistBtn() {
    var list = getWatchlist();
    var countEl = document.getElementById('watchlistCount');
    if (countEl) countEl.textContent = list.length + '/' + WL_MAX;
    var btn = document.getElementById('addWatchlistBtn');
    if (!btn) return;
    var code = document.getElementById('stockCode').value.trim();
    var exists = list.some(function(item) { return item.code === code; });
    if (list.length >= WL_MAX) {
        btn.disabled = true; btn.textContent = '池满'; btn.style.background = '#aaa';
    } else if (exists) {
        btn.disabled = true; btn.textContent = '已在池中'; btn.style.background = '#aaa';
    } else if (!dataLoaded || !allStockData[code]) {
        btn.disabled = true; btn.textContent = '入观察池'; btn.style.background = '#aaa';
    } else {
        btn.disabled = false; btn.textContent = '入观察池'; btn.style.background = '#27ae60';
    }
}
function renderWatchlist() {
    var list = getWatchlist();
    var container = document.getElementById('watchlistItems');
    if (!container) return;
    var manageBtn = document.getElementById('manageWatchlistBtn');
    var batchArea = document.getElementById('batchDeleteArea');
    var batchBtn = document.getElementById('batchDeleteBtn');
    if (manageBtn) manageBtn.textContent = wlMode === 'normal' ? '管理' : '退出管理';
    if (batchArea) batchArea.style.display = wlMode === 'manage' ? 'inline' : 'none';
    if (batchBtn) batchBtn.textContent = '删除选中(' + wlSelected.size + ')';
    if (list.length === 0) {
        container.innerHTML = '<span style="color:#bbb;font-size:12px;">观察池为空，查看个股后点击"入观察池"添加</span>';
        return;
    }
    var html = '';
    for (var i = 0; i < list.length; i++) {
        var item = list[i];
        var sel = wlSelected.has(item.code);
        if (wlMode === 'manage') {
            html += '<div class="wl-chip' + (sel ? ' selected' : '') + '" onclick="toggleSelect(\'' + item.code + '\')">';
            html += '<input type="checkbox" ' + (sel ? 'checked' : '') + ' style="margin-right:3px;pointer-events:none;">';
            html += item.name + '(' + item.code + ')</div>';
        } else {
            html += '<div class="wl-chip" onclick="loadFromWatchlist(\'' + item.code + '\')">';
            html += '<span>' + item.name + '(' + item.code + ')</span>';
            html += '<span class="chip-x" onclick="event.stopPropagation();removeFromWatchlist(\'' + item.code + '\')">&times;</span></div>';
        }
    }
    container.innerHTML = html;
}
</script>
