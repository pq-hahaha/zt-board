<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评分排行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f6fa; color: #333; font-family: "Microsoft YaHei", sans-serif; padding: 10px; }
.header { text-align: center; margin-bottom: 12px; }
.header h1 { font-size: 20px; color: #c0392b; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.ranking-table { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #e74c3c; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 8px; text-align: center; position: sticky; top: 0; }
thead th:nth-child(1) { width: 50px; }
thead th:nth-child(2) { width: 80px; }
thead th:nth-child(3) { width: auto; text-align: left; padding-left: 16px; }
thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7) { width: 80px; }
tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
tbody tr:hover { background: #fef5f5; }
tbody td { padding: 8px; text-align: center; font-size: 14px; }
tbody td:nth-child(1) { font-weight: bold; color: #999; font-size: 13px; }
tbody td:nth-child(2) { font-family: Consolas, monospace; color: #555; font-size: 13px; }
tbody td:nth-child(3) { text-align: left; padding-left: 16px; font-weight: 500; }
.score-total { font-weight: bold; font-size: 16px; }
.score-high { color: #e74c3c; }
.score-mid { color: #e67e22; }
.score-low { color: #3498db; }
.sub-score { font-size: 13px; color: #777; }
.sub-r3 { color: #27ae60; }
.loading { text-align: center; padding: 60px; color: #aaa; font-size: 16px; }
.link-back { text-align: center; margin: 10px 0; }
.link-back a { color: #3498db; font-size: 13px; text-decoration: none; }
.link-back a:hover { text-decoration: underline; }
.filter-bar { max-width: 900px; margin: 0 auto 10px; display: flex; gap: 8px; align-items: center; }
.filter-bar input { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 200px; outline: none; }
.filter-bar input:focus { border-color: #3498db; }
.filter-bar span { font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="header">
    <h1>个股评分排行</h1>
    <p id="dateInfo">加载中...</p>
</div>
<div class="link-back">
    <a href="breadth_chart_v2.html">返回图谱</a>
</div>
<div class="filter-bar">
    <input type="text" id="filterInput" placeholder="搜索代码/名称" oninput="renderTable()">
    <span id="countInfo"></span>
</div>
<div class="ranking-table">
    <table>
        <thead>
            <tr>
                <th>排名</th>
                <th>代码</th>
                <th>名称</th>
                <th>总分</th>
                <th>r1涨停</th>
                <th>r2量价</th>
                <th>r3扣分</th>
            </tr>
        </thead>
        <tbody id="rankBody">
            <tr><td colspan="7" class="loading">正在加载评分数据...</td></tr>
        </tbody>
    </table>
</div>

<script>
var allData = [];
var nameMap = {};

function loadData() {
    var scoreUrl = (window.location.hostname === 'pq-hahaha.github.io')
        ? 'https://pq-hahaha.github.io/zt-board/stock_basic_scores_v2.json'
        : 'stock_basic_scores_v2.json';
    var poolUrl = (window.location.hostname === 'pq-hahaha.github.io')
        ? 'https://pq-hahaha.github.io/zt-board/stock_pool.json'
        : 'stock_pool.json';

    Promise.all([
        fetch(scoreUrl).then(function(r) { return r.json(); }),
        fetch(poolUrl).then(function(r) { return r.json(); })
    ]).then(function(results) {
        var scoreData = results[0];
        var poolData = results[1];

        for (var i = 0; i < poolData.length; i++) {
            var code = poolData[i].code.split('.')[0];
            nameMap[code] = poolData[i].name;
        }

        var scores = scoreData.scores;
        allData = [];
        for (var code in scores) {
            var s = scores[code];
            if (s.s >= 10) {
                allData.push({
                    code: code,
                    name: nameMap[code] || code,
                    score: s.s,
                    r1: s.r1 || 0,
                    r2: s.r2 || 0,
                    r3: s.r3 || 0
                });
            }
        }
        allData.sort(function(a, b) { return b.score - a.score; });

        document.getElementById('dateInfo').textContent =
            '数据日期: ' + scoreData.date + ' | 有效得分: ' + scoreData.scored + ' | 展示>=10分: ' + allData.length + '只';

        renderTable();
    }).catch(function(e) {
        document.getElementById('rankBody').innerHTML =
            '<tr><td colspan="7" class="loading" style="color:#e74c3c">加载失败: ' + e.message + '</td></tr>';
    });
}

function renderTable() {
    var filter = document.getElementById('filterInput').value.trim().toLowerCase();
    var filtered = allData;
    if (filter) {
        filtered = allData.filter(function(item) {
            return item.code.indexOf(filter) >= 0 ||
                   item.name.toLowerCase().indexOf(filter) >= 0;
        });
    }

    document.getElementById('countInfo').textContent = '显示 ' + filtered.length + '/' + allData.length + ' 只';

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var rank = i + 1;
        var scoreClass = item.score >= 25 ? 'score-high' : (item.score >= 15 ? 'score-mid' : 'score-low');
        var r3Display = item.r3 > 0 ? '-' + item.r3 : '0';
        html += '<tr>';
        html += '<td>' + rank + '</td>';
        html += '<td>' + item.code + '</td>';
        html += '<td>' + item.name + '</td>';
        html += '<td class="score-total ' + scoreClass + '">' + item.score + '</td>';
        html += '<td class="sub-score">' + item.r1 + '</td>';
        html += '<td class="sub-score">' + (item.r2 % 1 === 0 ? item.r2 : item.r2.toFixed(1)) + '</td>';
        html += '<td class="sub-score sub-r3">' + r3Display + '</td>';
        html += '</tr>';
    }
    if (filtered.length === 0) {
        html = '<tr><td colspan="7" class="loading">无匹配结果</td></tr>';
    }
    document.getElementById('rankBody').innerHTML = html;
}

loadData();
</script>
</body>
</html>
