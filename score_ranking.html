<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>评分排行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f6fa; color: #333; font-family: "Microsoft YaHei", sans-serif; padding: 10px; }
.header { text-align: center; margin-bottom: 10px; }
.header h1 { font-size: 20px; color: #c0392b; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.ranking-wrap { max-width: 960px; margin: 0 auto; }
.link-back { margin-bottom: 8px; }
.link-back a { color: #3498db; font-size: 13px; text-decoration: none; }
.link-back a:hover { text-decoration: underline; }
.filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.filter-bar input { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 200px; outline: none; }
.filter-bar input:focus { border-color: #3498db; }
.filter-bar span { font-size: 12px; color: #888; }
.sync-btn { padding: 5px 14px; background: #27ae60; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
.sync-btn:hover { background: #219a52; }
.ranking-table { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #e74c3c; color: #fff; font-size: 13px; font-weight: 600; padding: 8px 6px; text-align: center; position: sticky; top: 0; z-index: 1; cursor: default; user-select: none; }
thead th.sortable { cursor: pointer; }
thead th.sortable:hover { background: #c0392b; }
thead th.sort-asc::after { content: ' \u25B2'; font-size: 10px; }
thead th.sort-desc::after { content: ' \u25BC'; font-size: 10px; }
tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
tbody tr:hover { background: #fef5f5; }
/* 关注行醒目状态 - 金色底+加粗 */
tbody tr.watched { background: #fff8dc !important; }
tbody tr.watched td { font-weight: 600; }
tbody tr.watched:hover { background: #ffefd5 !important; }
/* 低分关注行 - 淡金色,区分于>=10分 */
tbody tr.watched-low { background: #fffbe6 !important; }
tbody tr.watched-low td { font-weight: 500; color: #777; }
tbody tr.watched-low:hover { background: #fff3d0 !important; }
tbody td { padding: 7px 6px; text-align: center; font-size: 14px; }
/* 排名列 */
.td-rank { font-weight: bold; color: #999; font-size: 13px; width: 45px; }
/* 代码列 */
.td-code { font-family: Consolas, monospace; color: #555; font-size: 13px; width: 75px; }
/* 名称列 */
.td-name { text-align: left; padding-left: 10px; font-weight: 500; }
/* 总分列 */
.score-total { font-weight: bold; font-size: 16px; }
.score-high { color: #e74c3c; }
.score-mid { color: #e67e22; }
.score-low { color: #3498db; }
.score-under10 { color: #999; font-size: 13px; }
/* 子分列 */
.sub-score { font-size: 13px; color: #777; }
.sub-r3 { color: #27ae60; }
.sub-score-low { font-size: 13px; color: #bbb; }
/* 关注按钮列 */
.td-follow { width: 60px; }
.btn-follow { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; color: #555; transition: all 0.15s; }
.btn-follow:hover { border-color: #e67e22; color: #e67e22; }
.btn-follow.active { background: #e67e22; color: #fff; border-color: #e67e22; }
/* 关注状态列 */
.td-follow-status { width: 70px; font-size: 13px; }
.status-yes { color: #e67e22; font-weight: 600; }
.status-no { color: #aaa; }
.loading { text-align: center; padding: 60px; color: #aaa; font-size: 16px; }
</style>
</head>
<body>
<div class="header">
    <h1>个股评分排行</h1>
    <p id="dateInfo">加载中...</p>
</div>
<div class="ranking-wrap">
<div class="link-back">
    <a href="breadth_chart_v2.html">返回图谱</a>
</div>
<div class="filter-bar">
    <input type="text" id="filterInput" placeholder="搜索代码/名称/拼音" oninput="renderTable()">
    <span id="countInfo"></span>
    <button class="sync-btn" onclick="syncFollowList()">同步观察池</button>
</div>
<div class="ranking-table" style="max-height: calc(100vh - 120px); overflow-y: auto;">
    <table>
        <thead>
            <tr>
                <th class="sortable" data-sort="rank" id="thRank">排名</th>
                <th>代码</th>
                <th>名称</th>
                <th class="sortable" data-sort="score" id="thScore">总分</th>
                <th>r1涨停</th>
                <th>r2量价</th>
                <th>r3扣分</th>
                <th>关注</th>
                <th class="sortable" data-sort="follow" id="thFollow">关注状态</th>
            </tr>
        </thead>
        <tbody id="rankBody">
            <tr><td colspan="9" class="loading">正在加载评分数据...</td></tr>
        </tbody>
    </table>
</div>
</div>

<script>
var allData = [];       // >=10分的排行数据
var followedLowData = []; // <10分但被关注的数据
var nameMap = {};
var pinyinMap = {};
var basicScoresV2 = {};   // 评分数据(同步时需要)
var basicScoresV2Loaded = false;
var currentSort = 'score'; // 'score', 'rank', 'follow'
var sortDirection = 'desc';

// === IDB缓存辅助函数(复用cjws_cache数据库) ===
function getScoreIDBKey() {
    var t = new Date();
    return t.getFullYear() + '-' + ('0'+(t.getMonth()+1)).slice(-2) + '-' + ('0'+t.getDate()).slice(-2) + '_chongjiuwanshi_scores';
}
function scoreIdbGet(key) {
    return new Promise(function(resolve) {
        try {
            var req = indexedDB.open('cjws_cache', 1);
            req.onupgradeneeded = function(e) { try { e.target.result.createObjectStore('stock_data'); } catch(ex) {} };
            req.onsuccess = function(e) {
                var db = e.target.result;
                try {
                    var tx = db.transaction('stock_data', 'readonly');
                    var getReq = tx.objectStore('stock_data').get(key);
                    getReq.onsuccess = function() { resolve(getReq.result || null); };
                    getReq.onerror = function() { resolve(null); };
                } catch(ex) { resolve(null); }
            };
            req.onerror = function() { resolve(null); };
        } catch(e) { resolve(null); }
    });
}
function scoreIdbPut(key, val) {
    try {
        var req = indexedDB.open('cjws_cache', 1);
        req.onupgradeneeded = function(e) { try { e.target.result.createObjectStore('stock_data'); } catch(ex) {} };
        req.onsuccess = function(e) {
            var db = e.target.result;
            try {
                var tx = db.transaction('stock_data', 'readwrite');
                tx.objectStore('stock_data').put(val, key);
            } catch(ex) {}
        };
    } catch(e) {}
}

// 加载评分数据(同步功能需要, 如果已加载直接返回)
function loadBasicScoresV2() {
    if (basicScoresV2Loaded && Object.keys(basicScoresV2).length > 0) {
        return Promise.resolve();
    }
    // 未加载, 直接fetch评分数据(不重新渲染表格)
    var SCORE_VERSION = 'v2_20260626';
    return fetch(getBaseUrl() + 'stock_basic_scores_v2.json?v=' + SCORE_VERSION)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            basicScoresV2 = d.scores || {};
            basicScoresV2Loaded = true;
        })
        .catch(function() {
            // 网络失败, 用空数据继续
            basicScoresV2 = {};
            basicScoresV2Loaded = true;
        });
}

// === 关注列表(localStorage, 独立key, 含时间戳) ===
var FK_KEY = 'score_rank_follow';
var FK_BAK_KEY = 'score_rank_follow_bak';

function getFollowList() {
    try {
        var list = JSON.parse(localStorage.getItem(FK_KEY)) || [];
        if (list.length === 0) {
            var bak = JSON.parse(localStorage.getItem(FK_BAK_KEY)) || [];
            if (bak.length > 0) { list = bak; localStorage.setItem(FK_KEY, JSON.stringify(list)); }
        }
        return list;
    } catch(e) { return []; }
}

function saveFollowList(list) {
    localStorage.setItem(FK_KEY, JSON.stringify(list));
    if (list && list.length > 0) { localStorage.setItem(FK_BAK_KEY, JSON.stringify(list)); }
}

function isFollowed(code) {
    var list = getFollowList();
    for (var i = 0; i < list.length; i++) { if (list[i].code === code) return true; }
    return false;
}

function getFollowTime(code) {
    var list = getFollowList();
    for (var i = 0; i < list.length; i++) { if (list[i].code === code) return list[i].time; }
    return 0;
}

function toggleFollow(code) {
    var list = getFollowList();
    var found = false;
    for (var i = 0; i < list.length; i++) {
        if (list[i].code === code) {
            list.splice(i, 1);
            found = true;
            break;
        }
    }
    if (!found) {
        // 满30只,不允许添加(静默忽略)
        if (list.length >= 30) return;
        list.push({ code: code, name: nameMap[code] || '', time: Date.now() });
    }
    saveFollowList(list);
    // 重新构建数据(关注状态变了,<10分的可能新加入)
    rebuildDisplayData();
    renderTable();
}

// === 同步关注池与V2观察池 ===
function syncFollowList() {
    // 1. 读两个池 + V2删除记录
    var fkList = getFollowList();  // 排行活跃池
    var wlList = [];
    try { wlList = JSON.parse(localStorage.getItem('zt_watchlist')) || []; } catch(e) {}
    var removed = [];
    try { removed = JSON.parse(localStorage.getItem('zt_watchlist_removed')) || []; } catch(e) {}

    // 2. 合并(取合集), 名称回退: item.name → nameMap
    var merged = {};
    wlList.forEach(function(item) {
        merged[item.code] = {code: item.code, name: item.name || nameMap[item.code] || '', time: item.time || Date.now()};
    });
    fkList.forEach(function(item) {
        if (!merged[item.code]) {
            merged[item.code] = {code: item.code, name: item.name || nameMap[item.code] || '', time: item.time || Date.now()};
        }
    });

    // 3. 剔除删除记录中的票
    var removedCodes = {};
    removed.forEach(function(r) { removedCodes[r.code] = true; });
    for (var code in merged) {
        if (removedCodes[code]) delete merged[code];
    }

    // 4. 转数组 + 按分数排序(低→高)准备裁剪
    var mergedList = [];
    for (var code in merged) mergedList.push(merged[code]);

    if (mergedList.length > 30) {
        // 加载评分数据用于排序
        loadBasicScoresV2().then(function() {
            mergedList.sort(function(a, b) {
                var sa = (basicScoresV2[a.code] && basicScoresV2[a.code].s) ? basicScoresV2[a.code].s : 0;
                var sb = (basicScoresV2[b.code] && basicScoresV2[b.code].s) ? basicScoresV2[b.code].s : 0;
                if (sa !== sb) return sa - sb;
                return (a.time || 0) - (b.time || 0);
            });
            mergedList = mergedList.slice(-30);
            // 写回两个池
            saveFollowList(mergedList);
            try { localStorage.setItem('zt_watchlist', JSON.stringify(mergedList)); } catch(e) {}
            try { localStorage.setItem('zt_watchlist_bak', JSON.stringify(mergedList)); } catch(e) {}
            try { localStorage.setItem('zt_watchlist_removed', '[]'); } catch(e) {}
            rebuildDisplayData();
            renderTable();
            alert('已同步 ' + mergedList.length + ' 只股票(自动裁剪至30只)');
        });
        return;
    }

    // 5. 未超限,直接写回
    saveFollowList(mergedList);
    try { localStorage.setItem('zt_watchlist', JSON.stringify(mergedList)); } catch(e) {}
    try { localStorage.setItem('zt_watchlist_bak', JSON.stringify(mergedList)); } catch(e) {}
    try { localStorage.setItem('zt_watchlist_removed', '[]'); } catch(e) {}
    rebuildDisplayData();
    renderTable();
    alert('已同步 ' + mergedList.length + ' 只股票');
}

// === 列头排序 ===
document.getElementById('thRank').addEventListener('click', function() {
    if (currentSort === 'rank') { sortDirection = sortDirection === 'desc' ? 'asc' : 'desc'; }
    else { currentSort = 'rank'; sortDirection = 'asc'; }
    updateSortIndicators();
    renderTable();
});
document.getElementById('thScore').addEventListener('click', function() {
    if (currentSort === 'score') { sortDirection = sortDirection === 'desc' ? 'asc' : 'desc'; }
    else { currentSort = 'score'; sortDirection = 'desc'; }
    updateSortIndicators();
    renderTable();
});
document.getElementById('thFollow').addEventListener('click', function() {
    if (currentSort === 'follow') { sortDirection = sortDirection === 'desc' ? 'asc' : 'desc'; }
    else { currentSort = 'follow'; sortDirection = 'desc'; }
    updateSortIndicators();
    renderTable();
});

function updateSortIndicators() {
    var ths = document.querySelectorAll('thead th.sortable');
    for (var i = 0; i < ths.length; i++) { ths[i].classList.remove('sort-asc', 'sort-desc'); }
    var activeTh = document.querySelector('thead th[data-sort="' + currentSort + '"]');
    if (activeTh) { activeTh.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc'); }
}

// === 数据加载 ===
function getBaseUrl() {
    if (window.location.hostname === 'pq-hahaha.github.io') {
        return 'https://pq-hahaha.github.io/zt-board/';
    }
    return '';
}

function loadData() {
    var cacheKey = getScoreIDBKey();

    // 先试IDB缓存(当天有效)
    scoreIdbGet(cacheKey).then(function(cached) {
        if (cached && cached.scores && Object.keys(cached.scores).length > 0) {
            // 命中缓存, 直接使用(跳过fetch+parse)
            basicScoresV2 = cached.scores;
            nameMap = cached.nameMap || {};
            pinyinMap = cached.pinyinMap || {};
            basicScoresV2Loaded = true;
            rebuildDisplayDataFromScores(basicScoresV2, {date: cached.date});
            return;
        }

        // 未命中, 正常fetch
        var SCORE_VERSION = 'v2_20260626';
        var scoreUrl = getBaseUrl() + 'stock_basic_scores_v2.json?v=' + SCORE_VERSION;
        var poolUrl = getBaseUrl() + 'stock_pool.json';
        var pinyinUrl = getBaseUrl() + 'pinyin_initials.json';

        var scorePromise = fetch(scoreUrl).then(function(r) {
            if (!r.ok) throw new Error('scores HTTP ' + r.status);
            return r.json();
        });
        var poolPromise = fetch(poolUrl).then(function(r) {
            if (!r.ok) return null;
            return r.json();
        }).catch(function() { return null; });
        var pinyinPromise = fetch(pinyinUrl).then(function(r) {
            if (!r.ok) return {};
            return r.json();
        }).catch(function() { return {}; });

        Promise.all([scorePromise, poolPromise, pinyinPromise]).then(function(results) {
            var scoreData = results[0];
            var poolData = results[1];
            var pinyinData = results[2] || {};

            if (poolData) {
                for (var i = 0; i < poolData.length; i++) {
                    var code = poolData[i].code.split('.')[0];
                    nameMap[code] = poolData[i].name;
                }
            }
            pinyinMap = pinyinData;

            var scores = scoreData.scores;
            basicScoresV2 = scores;
            basicScoresV2Loaded = true;
            for (var code in scores) {
                if (!nameMap[code]) {
                    nameMap[code] = code;
                }
            }

            // 写IDB缓存(当天有效, 次日自动失效)
            scoreIdbPut(cacheKey, {
                date: scoreData.date,
                scores: scores,
                nameMap: nameMap,
                pinyinMap: pinyinMap
            });

            rebuildDisplayDataFromScores(scores, scoreData);

        }).catch(function(e) {
            document.getElementById('rankBody').innerHTML =
                '<tr><td colspan="9" class="loading" style="color:#e74c3c">加载失败: ' + e.message + '</td></tr>';
        });
    });
}

// 从评分数据构建显示列表
function rebuildDisplayDataFromScores(scores, scoreData) {
    allData = [];
    followedLowData = [];
    var followList = getFollowList();
    var followedCodes = {};
    for (var i = 0; i < followList.length; i++) { followedCodes[followList[i].code] = true; }

    for (var code in scores) {
        var s = scores[code];
        var item = {
            code: code,
            name: nameMap[code] || code,
            pinyin: pinyinMap[code] || '',
            score: s.s,
            r1: s.r1 || 0,
            r2: s.r2 || 0,
            r3: s.r3 || 0,
            detail: s.d || '',
            under10: s.s < 10
        };

        if (s.s >= 10) {
            allData.push(item);
        } else if (followedCodes[code]) {
            // <10分但被关注, 也加入显示
            followedLowData.push(item);
        }
    }

    // >=10分默认按总分从高到低
    allData.sort(function(a, b) { return b.score - a.score; });

    document.getElementById('dateInfo').textContent =
        '数据日期: ' + scoreData.date + ' | >=10分: ' + allData.length + '只 | 关注<10分: ' + followedLowData.length + '只';

    updateSortIndicators();
    renderTable();
}

// 关注状态变了时重建数据
function rebuildDisplayData() {
    // 需要从allData和followedLowData重新分配
    var combined = allData.concat(followedLowData);
    allData = [];
    followedLowData = [];
    var followList = getFollowList();
    var followedCodes = {};
    for (var i = 0; i < followList.length; i++) { followedCodes[followList[i].code] = true; }

    for (var j = 0; j < combined.length; j++) {
        var item = combined[j];
        if (item.score >= 10) {
            allData.push(item);
        } else if (followedCodes[item.code]) {
            followedLowData.push(item);
        }
        // <10且不关注的不显示
    }

    allData.sort(function(a, b) { return b.score - a.score; });
}

// === 渲染表格 ===
function renderTable() {
    var filter = document.getElementById('filterInput').value.trim().toLowerCase();
    var followList = getFollowList();

    // 合并显示数据: >=10分 + 关注的<10分
    var displayData = allData.concat(followedLowData);

    // 排序
    if (currentSort === 'score') {
        displayData.sort(function(a, b) {
            // >=10分排前面, <10分关注排后面, 同区间内按分数
            if (!a.under10 && b.under10) return -1;
            if (a.under10 && !b.under10) return 1;
            return sortDirection === 'desc' ? b.score - a.score : a.score - b.score;
        });
    } else if (currentSort === 'rank') {
        displayData.sort(function(a, b) {
            if (!a.under10 && b.under10) return -1;
            if (a.under10 && !b.under10) return 1;
            return sortDirection === 'asc' ? b.score - a.score : a.score - b.score;
        });
    } else if (currentSort === 'follow') {
        displayData.sort(function(a, b) {
            var aFollowed = isFollowed(a.code);
            var bFollowed = isFollowed(b.code);
            if (aFollowed && !bFollowed) return -1;
            if (!aFollowed && bFollowed) return 1;
            if (aFollowed && bFollowed) {
                var aTime = getFollowTime(a.code);
                var bTime = getFollowTime(b.code);
                return sortDirection === 'desc' ? aTime - bTime : bTime - aTime;
            }
            // 都不关注: >=10分按分数, <10分按分数
            if (!a.under10 && b.under10) return -1;
            if (a.under10 && !b.under10) return 1;
            return b.score - a.score;
        });
    }

    // 过滤
    var filtered = displayData;
    if (filter) {
        filtered = displayData.filter(function(item) {
            return item.code.indexOf(filter) >= 0 ||
                   item.name.toLowerCase().indexOf(filter) >= 0 ||
                   item.pinyin.indexOf(filter) >= 0;
        });
    }

    var totalShown = allData.length;
    var followLowCount = followedLowData.length;
    document.getElementById('countInfo').textContent =
        '>=10分: ' + totalShown + '只 | 关注<10分: ' + followLowCount + '只 | 显示 ' + filtered.length + '只';

    var html = '';
    var rankCounter = 0; // 只给>=10分的编号
    for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var followed = isFollowed(item.code);
        var isLow = item.under10;

        // 排名: >=10分有排名号, <10分关注的显示"--"
        if (!isLow) { rankCounter++; }
        var rank = isLow ? '--' : rankCounter;

        var scoreClass = isLow ? 'score-under10' :
                         (item.score >= 25 ? 'score-high' : (item.score >= 15 ? 'score-mid' : 'score-low'));
        var r3Display = item.r3 > 0 ? '-' + item.r3 : '0';
        var rowClass = followed ? (isLow ? 'watched-low' : 'watched') : '';
        var btnClass = followed ? ' active' : '';
        var btnText = followed ? '已关注' : '关注';
        var statusHtml = followed ? '<span class="status-yes">是</span>' : '<span class="status-no">否</span>';
        var subClass = isLow ? 'sub-score-low' : 'sub-score';

        html += '<tr class="' + rowClass + '">';
        html += '<td class="td-rank">' + rank + '</td>';
        html += '<td class="td-code">' + item.code + '</td>';
        html += '<td class="td-name">' + item.name + '</td>';
        html += '<td class="score-total ' + scoreClass + '">' + item.score + '</td>';
        html += '<td class="' + subClass + '">' + item.r1 + '</td>';
        html += '<td class="' + subClass + '">' + (item.r2 % 1 === 0 ? item.r2 : item.r2.toFixed(1)) + '</td>';
        html += '<td class="' + subClass + (item.r3 > 0 ? ' sub-r3' : '') + '">' + r3Display + '</td>';
        html += '<td class="td-follow"><span class="btn-follow' + btnClass + '" onclick="toggleFollow(\'' + item.code + '\')">' + btnText + '</span></td>';
        html += '<td class="td-follow-status">' + statusHtml + '</td>';
        html += '</tr>';
    }
    if (filtered.length === 0) {
        html = '<tr><td colspan="9" class="loading">无匹配结果</td></tr>';
    }
    document.getElementById('rankBody').innerHTML = html;
}

loadData();
</script>
</body>
</html>
