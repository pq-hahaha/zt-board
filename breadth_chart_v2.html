function loadPinyinMap() {

function onSearchInput() {
    updateWatchlistBtn();
    var val = document.getElementById('stockCode').value.trim().toLowerCase();
    var dd = document.getElementById('searchDropdown');
    if (!val || (!pinyinLoaded && !indexLoaded)) { dd.style.display = 'none'; return; }
    if (/^\d+$/.test(val)) { dd.style.display = 'none'; return; }

    searchResults = [];
    var sourceMap = pinyinLoaded ? pinyinMap : (indexLoaded ? chunkMap : {});
    for (var code in sourceMap) {
        var py = (pinyinMap[code] || '').toLowerCase();
        var name = stockNames[code] || '';
        if (py.indexOf(val) === 0 || name.indexOf(val) >= 0) {
            searchResults.push({code: code, name: name, py: pinyinMap[code] || ''});
            if (searchResults.length >= 30) break;
        }
    }
    if (searchResults.length === 0) { dd.style.display = 'none'; return; }
    searchSelectedIdx = -1;
    var html = '';
    for (var i = 0; i < searchResults.length; i++) {
        var r = searchResults[i];
        html += '<div class="search-item" onclick="selectSearch(' + i + ')" style="padding:6px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;">';

        html += '<span style="color:#999;font-size:12px;">' + r.code + ' (' + r.py + ')</span>';
        html += '</div>';
    }
    dd.innerHTML = html;
    dd.style.display = 'block';
}

function onSearchKey(e) {
    var dd = document.getElementById('searchDropdown');
    if (dd.style.display === 'none') { if (e.key === 'Enter') loadStock(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); searchSelectedIdx = Math.min(searchSelectedIdx + 1, searchResults.length - 1); highlightSearchItem(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); searchSelectedIdx = Math.max(searchSelectedIdx - 1, -1); highlightSearchItem(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (searchSelectedIdx >= 0) selectSearch(searchSelectedIdx); else if (searchResults.length > 0) selectSearch(0); else loadStock(); }
    else if (e.key === 'Escape') { dd.style.display = 'none'; }
}

function highlightSearchItem() {
    var dd = document.getElementById('searchDropdown');
    var items = dd.querySelectorAll('.search-item');
    for (var i = 0; i < items.length; i++) { items[i].style.background = (i === searchSelectedIdx) ? '#e8f4fd' : ''; }
    if (searchSelectedIdx >= 0 && items[searchSelectedIdx]) items[searchSelectedIdx].scrollIntoView({block: 'nearest'});
}

function selectSearch(idx) {
    if (idx < 0 || idx >= searchResults.length) return;
    var r = searchResults[idx];
    document.getElementById('stockCode').value = r.code;
    document.getElementById('searchDropdown').style.display = 'none';
    loadStock();
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('#stockCode') && !e.target.closest('#searchDropdown')) {
        document.getElementById('searchDropdown').style.display = 'none';
    }
});

// === 图表初始化 ===
var chart = echarts.init(document.getElementById('chart'));

function buildOption(priceData) {
    var markLineData = [];
    dayLineIndices.forEach(function(idx) { markLineData.push([{xAxis: idx}, {xAxis: idx}]); });

    return {
        backgroundColor: '#fff',
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(255,255,255,0.96)',
            borderColor: '#ddd',
            textStyle: {color: '#333', fontSize: 12},
            formatter: function(params) {
                var html = '';
                for (var p of params) {
                    if (p.value === null || p.value === undefined) continue;
                    if (p.seriesName === '个股价格') html += '<span style="color:#e74c3c">价格: ' + p.value.toFixed(2) + '</span><br>';
                    else if (p.seriesName === '上涨家数') html += '<span style="color:#2980b9">上涨: ' + p.value + '家</span><br>';
                }
                var idx = params[0].dataIndex;
                for (var i = dayBoundaries.length - 1; i >= 0; i--) {
                    if (idx >= dayBoundaries[i]) { html = '<b style="color:#e67e22">' + dateLabels[i] + '</b><br>' + html; break; }
                }
                return html;
            }
        },
        grid: {left: 65, right: 65, top: 25, bottom: 70},
        xAxis: {
            type: 'category', data: xLabels,
            axisLine: {lineStyle: {color: '#bbb'}},
            axisLabel: {
                interval: 0,
                formatter: function(value) {
                    if (dateLabels.indexOf(value) >= 0) return '{date|' + value + '}';
                    if (value === '11:30') return '{time|' + value + '}';
                    return '';
                },
                rich: { date: {color: '#C00000', fontSize: 15, fontWeight: 'bold'}, time: {color: '#999', fontSize: 10} }
            },
            splitLine: {
                show: true,
                interval: function(idx) { return hourLineIndices.includes(idx); },
                lineStyle: {color: 'rgba(0,0,0,0.12)', type: 'dashed', width: 1}
            }
        },
        yAxis: [
            { type: 'value', name: '股价', nameTextStyle: {color: '#e74c3c', fontSize: 11}, position: 'left', axisLine: {lineStyle: {color: '#e74c3c'}}, axisLabel: {color: '#e74c3c', fontSize: 11}, splitLine: {lineStyle: {color: 'rgba(0,0,0,0.05)'}}, scale: true },
            { type: 'value', name: '上涨家数', nameTextStyle: {color: '#2980b9', fontSize: 11}, position: 'right', min: 0, max: 5000, axisLine: {lineStyle: {color: '#2980b9'}}, axisLabel: {color: '#2980b9', fontSize: 11}, splitLine: {show: false} }
        ],
        dataZoom: [
            {type: 'inside', start: 0, end: 100},
            { type: 'slider', start: 0, end: 100, height: 18, bottom: 8, backgroundColor: '#f0f0f0', borderColor: '#ddd', fillerColor: 'rgba(100,100,150,0.15)', handleStyle: {color: '#999'}, textStyle: {color: '#888'} }
        ],
        series: [
            {
                name: '个股价格', type: 'line', data: priceData, yAxisIndex: 0,
                smooth: false, symbol: 'none', connectNulls: true,
                lineStyle: {color: '#e74c3c', width: 2.5},
                areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(231,76,60,0.10)'}, {offset: 1, color: 'rgba(231,76,60,0.0)'}]) },
                markArea: { silent: true, data: markAreaPairs },
                markLine: { silent: true, symbol: 'none', lineStyle: {type: 'solid', color: '#e67e22', width: 2}, data: markLineData }
            },
            {
                name: '上涨家数', type: 'line', data: advData, yAxisIndex: 1,
                smooth: true, symbol: 'circle', symbolSize: 3,
                lineStyle: {color: '#2980b9', width: 1.5}, itemStyle: {color: '#2980b9'}, connectNulls: false
            }
        ]
    };
}

chart.setOption(buildOption(currentPriceData));
window.addEventListener('resize', function() { chart.resize(); });

// === 懒加载: 股票索引(轻量,~15KB gzip,即刻加载) ===
function loadStockIndex() {
    var url = (window.location.hostname === 'pq-hahaha.github.io')
        ? 'https://pq-hahaha.github.io/zt-board/stock_index.json'
        : 'stock_index.json';
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
        stockNames = d.names;
        chunkMap = d.chunks;
        NUM_CHUNKS = d.num_chunks || 25;
        indexLoaded = true;
        var ind = document.getElementById('loadIndicator');
        if (ind) { ind.innerHTML = '<span style="color:#27ae60">索引已加载</span>'; setTimeout(function() { if (ind) ind.style.display = 'none'; }, 800); }
        // 索引加载后刷新观察池(名称可用)和按钮状态
        renderWatchlist();
        updateWatchlistBtn();
    }).catch(function(e) {
        var ind = document.getElementById('loadIndicator');
        if (ind) ind.innerHTML = '<span style="color:#e74c3c">索引加载失败,刷新重试</span>';
        console.warn('Index load failed:', e);
    });
}
loadStockIndex();

// === 懒加载: 数据chunk(按需加载,~100KB gzip/chunk) ===
function loadStockChunk(chunkId) {
    if (loadedChunks[chunkId]) return Promise.resolve(loadedChunks[chunkId]);
    var url = (window.location.hostname === 'pq-hahaha.github.io')
        ? 'https://pq-hahaha.github.io/zt-board/chunks/sd_chunk_' + chunkId + '.json'
        : 'chunks/sd_chunk_' + chunkId + '.json';
    return fetch(url).then(function(r) { return r.json(); }).then(function(d) {
        var n = d.n;
        for (var i = 0; i < d.c.length; i++) {
            var code = d.c[i];
            var prices = [];
            for (var j = 0; j < n; j++) {
                var p = d.p[i * n + j];
                prices.push(p === 0 ? null : p / 100);
            }
            allStockData[code] = prices;
        }
        loadedChunks[chunkId] = true;
        return true;
    }).catch(function(e) {
        console.warn('Chunk ' + chunkId + ' load failed:', e);
        return false;
    });
}

// === 个股查看(懒加载版) ===
function loadStock() {
    var code = document.getElementById('stockCode').value.trim();
    if (!code) return;

    showBasicScoreV2(code);

    // 数据已在内存 → 直接渲染
    if (allStockData[code]) {
        renderStockChart(code);
        return;
    }

    // 索引未加载 → 等待
    if (!indexLoaded) {
        document.getElementById('stockName').innerHTML = '<span style="color:#e67e22">索引加载中...</span>';
        return;
    }

    // 索引中不存在此代码
    if (!chunkMap.hasOwnProperty(code)) {
        document.getElementById('stockName').innerHTML = '<span style="color:#e74c3c">未找到: ' + code + '</span>';
        return;
    }

    // 按需加载chunk
    var ind = document.getElementById('loadIndicator');
    if (ind) { ind.style.display = ''; ind.innerHTML = '<span style="color:#3498db">正在加载个股数据...</span>'; }

    loadStockChunk(chunkMap[code]).then(function(success) {
        if (ind) { ind.style.display = 'none'; }
        if (success && allStockData[code]) {
            renderStockChart(code);
        } else {
            document.getElementById('stockName').innerHTML = '<span style="color:#e74c3c">数据加载失败</span>';
        }
    });
}

function renderStockChart(code) {
    var name = stockNames[code] || code;
    document.getElementById('stockName').textContent = name + '(' + code + ')';
    currentPriceData = allStockData[code];
    chart.setOption(buildOption(currentPriceData));
    updateWatchlistBtn();
}

// === 观察池(含备份恢复机制) ===
var WL_KEY = 'zt_watchlist';
var WL_BAK_KEY = 'zt_watchlist_bak';
var WL_MAX = 30;
var wlMode = 'normal';
var wlSelected = new Set();

function getWatchlist() {
    try {
        var list = JSON.parse(localStorage.getItem(WL_KEY)) || [];
        // 主key为空时自动从备份恢复
        if (list.length === 0) {
            var bak = JSON.parse(localStorage.getItem(WL_BAK_KEY)) || [];
            if (bak.length > 0) {
                list = bak;
                localStorage.setItem(WL_KEY, JSON.stringify(list));
            }
        }
        return list;
    } catch(e) { return []; }
}

function saveWatchlist(list) {
    localStorage.setItem(WL_KEY, JSON.stringify(list));
    // 双写备份(仅非空时写备份,避免备份覆盖空主)
    if (list && list.length > 0) {
        localStorage.setItem(WL_BAK_KEY, JSON.stringify(list));
    }
}

function addToWatchlist() {
    var code = document.getElementById('stockCode').value.trim();
    if (!code) return;
    // 索引未加载时不允许添加(无法获取名称)
    if (!indexLoaded && !stockNames[code]) return;
    var list = getWatchlist();
    if (list.length >= WL_MAX) return;
    for (var i = 0; i < list.length; i++) { if (list[i].code === code) return; }
    var name = stockNames[code] || code;
    list.push({code: code, name: name});
    saveWatchlist(list);
    renderWatchlist();
    updateWatchlistBtn();
}

function removeFromWatchlist(code) {
    var list = getWatchlist().filter(function(item) { return item.code !== code; });
    saveWatchlist(list);
    renderWatchlist();
    updateWatchlistBtn();
}

function removeFromWatchlistBatch() {
    if (wlSelected.size === 0) return;
    var list = getWatchlist().filter(function(item) { return !wlSelected.has(item.code); });
    saveWatchlist(list);
    wlSelected.clear();
    renderWatchlist();
    updateWatchlistBtn();
}

function loadFromWatchlist(code) {
    document.getElementById('stockCode').value = code;
    loadStock();
}

function toggleManageMode() {
    wlMode = wlMode === 'normal' ? 'manage' : 'normal';
    wlSelected.clear();
    renderWatchlist();
}

function toggleSelect(code) {
    if (wlSelected.has(code)) wlSelected.delete(code);
    else wlSelected.add(code);
    renderWatchlist();
}

function toggleSelectAll() {
    var list = getWatchlist();
    if (wlSelected.size === list.length) wlSelected.clear();
    else { wlSelected.clear(); list.forEach(function(item) { wlSelected.add(item.code); }); }
    renderWatchlist();
}

function updateWatchlistBtn() {
    var list = getWatchlist();
    var countEl = document.getElementById('watchlistCount');
    if (countEl) countEl.textContent = list.length + '/' + WL_MAX;
    var btn = document.getElementById('addWatchlistBtn');
    if (!btn) return;
    var code = document.getElementById('stockCode').value.trim();
    var exists = list.some(function(item) { return item.code === code; });
    if (list.length >= WL_MAX) {
        btn.disabled = true; btn.textContent = '池满'; btn.style.background = '#aaa';
    } else if (exists) {
        btn.disabled = true; btn.textContent = '已在池中'; btn.style.background = '#aaa';
    } else if (!indexLoaded || !stockNames[code]) {
        btn.disabled = true; btn.textContent = '入观察池'; btn.style.background = '#aaa';
    } else {
        btn.disabled = false; btn.textContent = '入观察池'; btn.style.background = '#27ae60';
    }
}

function renderWatchlist() {
    var list = getWatchlist();
    var container = document.getElementById('watchlistItems');
    if (!container) return;
    var manageBtn = document.getElementById('manageWatchlistBtn');
    var batchArea = document.getElementById('batchDeleteArea');
    var batchBtn = document.getElementById('batchDeleteBtn');
    if (manageBtn) manageBtn.textContent = wlMode === 'normal' ? '管理' : '退出管理';
    if (batchArea) batchArea.style.display = wlMode === 'manage' ? 'inline' : 'none';
    if (batchBtn) batchBtn.textContent = '删除选中(' + wlSelected.size + ')';
    if (list.length === 0) {
        container.innerHTML = '<span style="color:#bbb;font-size:12px;">观察池为空，查看个股后点击"入观察池"添加</span>';
        return;
    }
    var html = '';
    for (var i = 0; i < list.length; i++) {
        var item = list[i];
        // 名称: 优先从索引取(最新), 否则用localStorage存的
        var displayName = stockNames[item.code] || item.name || item.code;
        var sel = wlSelected.has(item.code);
        if (wlMode === 'manage') {
            html += '<div class="wl-chip' + (sel ? ' selected' : '') + '" onclick="toggleSelect(\'' + item.code + '\')">';
            html += '<input type="checkbox" ' + (sel ? 'checked' : '') + ' style="margin-right:3px;pointer-events:none;">';
            html += displayName + '(' + item.code + ')</div>';
        } else {
            html += '<div class="wl-chip" onclick="loadFromWatchlist(\'' + item.code + '\')">';
            html += '<span>' + displayName + '(' + item.code + ')</span>';
            var scoreObj = basicScoresV2[item.code];
            if (scoreObj && scoreObj.s > 0) {
                html += '<span class="wl-score">' + scoreObj.s + '分</span>';
            }
            html += '<span class="chip-x" onclick="event.stopPropagation();removeFromWatchlist(\'' + item.code + '\')">&times;</span></div>';
        }
    }
    container.innerHTML = html;
}

// === V2评分(按需加载) ===
var SCORE_DATA_VERSION = 'v2_20260625';

function loadBasicScoresV2() {
    if (basicScoresV2Loaded) return Promise.resolve();
    if (basicScoresV2Loading) return basicScoresV2Loading;
    var url = (window.location.hostname === 'pq-hahaha.github.io')
        ? 'https://pq-hahaha.github.io/zt-board/stock_basic_scores_v2.json?v=' + SCORE_DATA_VERSION
        : 'stock_basic_scores_v2.json?v=' + SCORE_DATA_VERSION;
    basicScoresV2Loading = fetch(url).then(function(r) { return r.json(); }).then(function(d) {
        basicScoresV2 = d.scores;
        basicScoresV2Loaded = true;
        basicScoresV2Loading = null;
    }).catch(function(e) { console.warn('V2 scores load failed:', e); basicScoresV2Loading = null; });
    return basicScoresV2Loading;
}

function showBasicScoreV2(code) {
    loadBasicScoresV2().then(function() {
        var el = document.getElementById('basicScore');
        if (!el || !basicScoresV2[code]) { if (el) el.innerHTML = ''; return; }
        var s = basicScoresV2[code];
        var score = s.s, r1 = s.r1 || 0, r2 = s.r2 || 0, r3 = s.r3 || 0;
        var r3d = r3 > 0 ? '-' + r3 : '0';
        if (score > 0) {
            el.innerHTML = '<span style="background:#e74c3c;color:#fff;padding:1px 8px;border-radius:3px;font-weight:bold;font-size:13px;">' + score + '分(' + r1 + ',' + r2 + ',' + r3d + ')</span>';
        } else {
            el.innerHTML = '<span style="color:#ccc;font-size:12px;">0分</span>';
        }
    });
}

// === 页面初始化 ===
// 观察池立即渲染(用localStorage数据,不等索引)
renderWatchlist();
// 索引加载后刷新观察池(名称更新)
// 评分加载后刷新观察池(分数显示)
loadBasicScoresV2().then(function() { renderWatchlist(); });

</script>
